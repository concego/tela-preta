<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Caixa Preta</title>
    <style>
        body { background-color: #000; color: #fff; font-family: monospace; padding: 10px; display: flex; flex-direction: column; height: 90vh; }
        textarea { flex-grow: 1; background: #111; color: #0f0; border: 1px solid #333; padding: 10px; resize: none; margin-bottom: 10px; }
        input { padding: 10px; background: #222; color: #fff; border: 1px solid #555; font-family: monospace; font-size: 16px; }
        input:focus { outline: 2px solid #fff; }
    </style>
</head>
<body>
    <label for="saida">Caixa Preta - Histórico (Use as setas para ler):</label>
    <textarea id="saida" readonly aria-label="Histórico da Caixa Preta"></textarea>
    
    <label for="comando">Digite um comando e aperte Enter:</label>
    <input type="text" id="comando" placeholder="Ex: npm install" autofocus autocomplete="off">

    <script>
        const { ipcRenderer } = require('electron');
        const saida = document.getElementById('saida');
        const comando = document.getElementById('comando');

        // A Mágica de Acessibilidade: Arranca fora os códigos de cores do texto
        function limparCores(texto) {
            return texto.replace(/\x1b\[[0-9;]*m/g, '');
        }

        // Quando a "mangueira" jorra dados do PowerShell
        ipcRenderer.on('terminal-output', (event, dados) => {
            const textoLimpo = limparCores(dados);
            saida.value += textoLimpo;
            saida.scrollTop = saida.scrollHeight; // Desce a rolagem pro final automaticamente
        });

        comando.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = comando.value.trim();
                
                // Truque pra limpar a tela rapidinho
                if (cmd.toLowerCase() === 'clear' || cmd.toLowerCase() === 'cls') {
                    saida.value = '';
                    comando.value = '';
                } else if (cmd !== '') {
                    // Manda pro motor
                    ipcRenderer.send('terminal-input', cmd);
                    comando.value = '';
                }
            }
        });
    </script>
</body>
</html>
